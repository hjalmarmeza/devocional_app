<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusiChris Studio | Devocional Control Center</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --glass: rgba(255, 255, 255, 0.1);
            --bg: #0a0a0c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Fondo animado sutil */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, #1a1a2e, #0a0a0c);
            z-index: -1;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            width: 100%;
        }

        .logo-container img {
            width: 120px;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
            margin-bottom: 15px;
        }

        h1 {
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
            color: var(--gold);
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin-bottom: 100px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .video-preview {
            width: 100%;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-group {
            margin-bottom: 20px;
        }

        .info-group label {
            display: block;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-group p {
            font-size: 0.95rem;
            color: #fff;
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .footer-nav {
            position: fixed;
            bottom: 20px;
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .nav-item.active {
            color: var(--gold);
        }

        /* Splash Screen Premium */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out, visibility 1s;
        }

        .splash-logo {
            width: 150px;
            height: 150px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
            animation: pulse 2s infinite ease-in-out;
            margin-bottom: 25px;
        }

        .splash-text {
            font-size: 1.4rem;
            letter-spacing: 4px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0;
            animation: fadeInText 1s forwards 0.5s;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        @keyframes fadeInText {
            to { opacity: 1; transform: translateY(-10px); }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .container {
                width: 95%;
                margin-top: 10px;
            }
            .card {
                padding: 20px;
                border-radius: 30px;
            }
            h1 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Pantalla de Inicio -->
    <div id="splash-screen">
        <img src="assets/logo.png" alt="MusiChris Logo" class="splash-logo">
        <div class="splash-text">MusiChris</div>
    </div>

    <div class="ambient-bg"></div>

    <header>
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo" style="width: 80px; height: 80px; object-fit: cover; border-radius: 20px; border: 1px solid rgba(255,215,0,0.3); box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
        </div>
        <h1>MusiChris Studio</h1>
    </header>

    <div class="container">
        <div class="card">
            <div class="status-badge">Publicación Automática Activa</div>
            
            <div class="video-preview">
                <video id="main-video" controls poster="plantilla_base.png">
                    <source src="shorts/2026-05-04_short.mp4" type="video/mp4">
                    Tu navegador no soporta video.
                </video>
            </div>

            <div class="info-group">
                <label>Última Palabra de Victoria</label>
                <p id="video-date">04 de mayo, 2026</p>
            </div>

            <div class="info-group">
                <label>Horario Programado</label>
                <p>07:00 AM (España)</p>
            </div>

            <a href="https://www.youtube.com/@Musichris_Studio" target="_blank" class="btn-primary">
                <span>📺 Ver en YouTube</span>
            </a>
        </div>
    </div>

    <!-- Consola de vista única limpia -->

    <script>
        // Lógica de Splash Screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.visibility = 'hidden';
                }, 1000);
            }, 2000);
        });

        // Registro de Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registrado con éxito'))
                .catch(err => console.log('Error al registrar SW', err));
        }

        // Fecha automática
        const date = new Date();
        document.getElementById('video-date').innerText = date.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
    </script>
</body>
</html>
