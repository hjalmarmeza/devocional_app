<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devocional App - Console</title>
    <style>
        :root {
            --bg: #0a0e14;
            --glass: rgba(255, 255, 255, 0.05);
            --gold: #d4af37;
            --white: #e0e0e0;
        }
        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: var(--gold); font-weight: 300; letter-spacing: 2px; }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .date { font-size: 0.8em; color: var(--gold); }
        .title { font-size: 1.2em; margin: 10px 0; }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            text-transform: uppercase;
        }
        .pending { background: #554400; color: #ffcc00; }
        .published { background: #004411; color: #00ff66; }
        .btn {
            background: var(--gold);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>DEVOCIONAL APP</h1>
    <div class="container" id="app">
        <!-- Los devocionales se cargarán aquí -->
        <p>Cargando consola...</p>
    </div>

    <script>
        async function loadDevocionales() {
            try {
                // En un entorno real, esto leería de una API o Firebase
                // Para esta demo, simulamos la lectura del JSON
                const response = await fetch('../devocionales_2026.json');
                const data = await response.json();
                const container = document.getElementById('app');
                container.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="date">${item.fecha}</div>
                        <div class="title">${item.titulo}</div>
                        <div class="status ${item.publicado ? 'published' : 'pending'}">
                            ${item.publicado ? 'Publicado' : 'Pendiente'}
                        </div>
                        ${!item.publicado ? `<button class="btn" onclick="publish('${item.fecha}')">PUBLICAR AHORA</button>` : ''}
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('app').innerHTML = '<p>Error al cargar la consola. Asegúrate de estar en un servidor web.</p>';
            }
        }

        function publish(fecha) {
            alert('Enviando comando de publicación para: ' + fecha + '\n(Esto activará el GitHub Action)');
        }

        loadDevocionales();
    </script>
</body>
</html>
