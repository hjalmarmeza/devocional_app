name: Devocional App Automation

on:
  schedule:
    - cron: '0 5 * * *' # Corre todos los días a las 5:00 AM UTC (7 AM España)
  workflow_dispatch:
    inputs:
      privacy_status:
        description: 'Privacidad del video (public, unlisted, private)'
        required: true
        default: 'unlisted'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow google-api-python-client google-auth-oauthlib google-auth-httplib2 gdown requests

    - name: Download Spiritual Backgrounds
      run: |
        mkdir -p assets/backgrounds_devocional
        # Descarga de la carpeta compartida de Google Drive
        gdown --folder "1cjlaW706d7laK9rPP-toB8DfCnTKrXBG" -O assets/backgrounds_devocional/ --remaining-ok

    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Generate Images
      run: python generador_devocionales.py

    - name: Render Video Short
      run: python render_video.py

    - name: Upload to YouTube
      env:
        YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        YOUTUBE_PRIVACY: ${{ github.event.inputs.privacy_status || 'public' }}
        CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        DEEPINFRA_API_KEY: ${{ secrets.DEEPINFRA_API_KEY }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: python upload_video.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add publicaciones/*.png
        git add shorts/*.mp4
        git add devocionales_2026.json
        git commit -m "Auto-generado y publicado devocional del día $(date +%F)" || echo "No hay cambios para subir"
        git push
