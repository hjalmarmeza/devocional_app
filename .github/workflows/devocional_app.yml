name: Devocional App Automation

on:
  schedule:
    - cron: '0 5 * * *' # Corre todos los días a las 5:00 AM UTC
  workflow_dispatch: # Permite ejecución manual desde la consola

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow google-api-python-client google-auth-oauthlib

    - name: Install FFmpeg
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Generate Images
      run: python Devocional/generador_devocionales.py

    - name: Render Video Short
      run: python Devocional/render_video.py

    - name: Upload to YouTube
      env:
        YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
      run: python Devocional/upload_video.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Devocional/publicaciones/*.png
        git add Devocional/shorts/*.mp4
        git commit -m "Auto-generado devocional del día $(date +%F)" || echo "No hay cambios para subir"
        git push
